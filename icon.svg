  <svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <defs>
      <!-- 浅色背景渐变 -->
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#EEF2FF"/>
        <stop offset="50%" stop-color="#E0E9FF"/>
        <stop offset="100%" stop-color="#D6E4FF"/>
      </linearGradient>

      <!-- 玻璃高光 -->
      <radialGradient id="sheen" cx="35%" cy="25%" r="60%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.0"/>
      </radialGradient>

      <!-- 波形光晕 -->
      <radialGradient id="coreGlow" cx="50%" cy="50%" r="45%">
        <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#4A90E2" stop-opacity="0.0"/>
      </radialGradient>

      <!-- 波形填充渐变 -->
      <linearGradient id="waveFill" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#4A90E2" stop-opacity="0.0"/>
      </linearGradient>

      <!-- 玻璃边框渐变 -->
      <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
        <stop offset="50%" stop-color="#C8D8F0" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      </linearGradient>

      <filter id="waveGlow">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <filter id="dotGlow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <clipPath id="squircle">
        <rect x="0" y="0" width="512" height="512" rx="120" ry="120"/>
      </clipPath>
    </defs>

    <!-- 背景 -->
    <rect width="512" height="512" rx="120" fill="url(#bg)"/>

    <g clip-path="url(#squircle)">
      <!-- 核心光晕 -->
      <rect width="512" height="512" fill="url(#coreGlow)"/>

      <!-- 玻璃高光 -->
      <rect width="512" height="512" fill="url(#sheen)"/>

      <!-- 波形填充区域 -->
      <polygon
        points="72,272 130,272 168,200 210,318 256,168 302,308 344,232 382,262 440,262 440,380 72,380"
        fill="url(#waveFill)"/>

      <!-- 主波形线 -->
      <polyline
        points="72,272 130,272 168,200 210,318 256,168 302,308 344,232 382,262 440,262"
        fill="none"
        stroke="#3A7BD5"
        stroke-width="6.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#waveGlow)"
        opacity="0.9"/>

      <!-- 峰值高亮圆点 -->
      <circle cx="256" cy="168" r="11"
        fill="#FFFFFF" opacity="0.95" filter="url(#dotGlow)"/>
      <circle cx="256" cy="168" r="6"
        fill="#3A7BD5" opacity="0.95"/>
    </g>

    <!-- 玻璃边框 -->
    <rect x="1.5" y="1.5" width="509" height="509" rx="119"
      fill="none"
      stroke="url(#borderGrad)"
      stroke-width="2"/>

    <!-- 底部内阴影模拟厚度 -->
    <rect x="0" y="0" width="512" height="512" rx="120"
      fill="none"
      stroke="#B8CCE8"
      stroke-width="1"
      opacity="0.4"/>
  </svg>